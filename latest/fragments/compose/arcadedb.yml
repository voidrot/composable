services:
  arcadedb:
    image: arcadedata/arcadedb:${ARCADEDB_VERSION:-26.3.2}
    ports:
      - ${ARCADEDB_STUDIO_PORT:-2480}:2480
      - ${ARCADEDB_BINARY_PORT:-2424}:2424
    environment:
      JAVA_OPTS: "-Darcadedb.server.rootPassword=${ARCADEDB_ROOT_PASSWORD:-playwithdata} -Darcadedb.dumpConfigAtStartup=true"
    volumes:
      - arcadedb_data:/home/arcadedb/databases
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "</dev/tcp/localhost/2480"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  arcadedb_data:
