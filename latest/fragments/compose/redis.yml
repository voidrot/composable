services:
  redis:
    image: redis:${REDIS_VERSION:-8}
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
