services:
  caddy:
    image: caddy:${CADDY_VERSION:-latest}
    ports:
      - ${CADDY_HTTP_PORT:-80}:80
      - ${CADDY_HTTPS_PORT:-443}:443
      - ${CADDY_HTTPS_UDP_PORT:-443}:443/udp
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
