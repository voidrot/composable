site_name: Composable
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Commands: commands.md
  - Fragments:
      - Overview: fragments/index.md
      - Compose:
          - django: fragments/compose/django.md
          - celery: fragments/compose/celery.md
          - celery-beat: fragments/compose/celery-beat.md
          - celery-flower: fragments/compose/celery-flower.md
          - postgresql: fragments/compose/postgresql.md
          - redis: fragments/compose/redis.md
          - valkey: fragments/compose/valkey.md
          - rabbitmq: fragments/compose/rabbitmq.md
          - nats: fragments/compose/nats.md
          - mosquitto: fragments/compose/eclipse-mosquitto.md
          - ollama: fragments/compose/ollama.md
          - vllm: fragments/compose/vllm.md
          - traefik: fragments/compose/traefik.md
          - traefik-config: fragments/compose/traefik-config.md
          - caddy: fragments/compose/caddy.md
          - chromadb: fragments/compose/chromadb.md
          - arcadedb: fragments/compose/arcadedb.md
          - grafana: fragments/compose/grafana.md
          - influxdb: fragments/compose/influxdb.md
          - jaeger: fragments/compose/jaeger.md
          - otel-collector: fragments/compose/otel-collector.md
  - Stacks: stacks/index.md

